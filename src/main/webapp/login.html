<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Community</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="login.css">
</head>
<body>

	<section class="container">

		<!-- LEFT SIDE -->
		<div class="left">
			<
			<h1 class="typing">
				<span>Welcome</span> <span>Back</span> <span>to</span> <span>DevConnect</span>
			</h1>
			<p>Access your dashboard and continue your development journey.</p>
		</div>

		<!-- RIGHT SIDE -->
		<div class="right">
			<form class="form" action="LoginServlet" method="post">
				<h2>Sign In to DevConnect</h2>

				<div class="input-group">
					<input type="email" name="email"> <label>Email
						Address</label>
				</div>

				<div class="input-group">
					<input type="password" name="password" required> <label>Password</label>
				</div>

				<div class="options">
					<label> <input type="checkbox" name="remember">
						Remember Me
					</label> <a href="#">Forgot Password?</a>
				</div>

				<button type="submit">Login</button>

				<p class="register-text">
					Don't have an account? <a href="Register.html">Register</a>
				</p>
			</form>
		</div>

	</section>

</body>
</html>
